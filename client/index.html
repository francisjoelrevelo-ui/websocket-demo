<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time Chat | WebSocket Demo</title>
  <!-- Fuente moderna de Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Diseño Estético y Moderno - Glassmorphism & Dark Mode */
    :root {
      --bg-color: #0f172a;
      --panel-bg: rgba(30, 41, 59, 0.7);
      --border-color: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #10b981;
      --msg-self: #3b82f6;
      --msg-other: #334155;
      --font-family: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app-container {
      width: 100%;
      max-width: 600px;
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 10px;
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #60a5fa, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .connection-panel {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: rgba(15, 23, 42, 0.6);
      color: var(--text-main);
      font-family: var(--font-family);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
      min-width: 200px;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-family: var(--font-family);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.95rem;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-connect {
      background: var(--success);
    }
    .btn-connect:hover { background: #059669; transform: translateY(-1px); }

    .btn-disconnect {
      background: var(--danger);
    }
    .btn-disconnect:hover { background: var(--danger-hover); transform: translateY(-1px); }
    .btn-disconnect:disabled { background: #475569; cursor: not-allowed; transform: none; color: #94a3b8; }

    .btn-send {
      background: var(--accent);
    }
    .btn-send:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-send:disabled { background: #475569; cursor: not-allowed; transform: none; color: #94a3b8; }

    .stats-panel {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--text-muted);
      background: rgba(0, 0, 0, 0.2);
      padding: 10px 15px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    .stat-badge {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-badge span {
      font-weight: 600;
      color: var(--text-main);
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--danger);
      display: inline-block;
      transition: background 0.3s ease;
    }
    .status-indicator.connected {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    #chat {
      height: 350px;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 8px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
    #chat::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.95rem;
      line-height: 1.4;
      animation: fadeIn 0.3s ease;
      word-wrap: break-word;
    }

    .message-info {
      align-self: center;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      font-size: 0.85rem;
      border-radius: 20px;
      padding: 6px 12px;
    }

    .message-other {
      align-self: flex-start;
      background: var(--msg-other);
      border-bottom-left-radius: 2px;
    }

    .message-self {
      align-self: flex-end;
      background: var(--msg-self);
      border-bottom-right-radius: 2px;
    }

    .message-sender {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 4px;
      font-weight: 500;
    }

    .input-panel {
      display: flex;
      gap: 10px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>
<body>

  <div class="app-container">
    <div class="header">
      <h1>Real-Time Chat</h1>
    </div>

    <!-- Panel de conexión -->
    <div class="connection-panel">
      <input type="text" id="url" value="ws://localhost:8080" placeholder="URL del servidor (ej. ws://localhost:8080)">
      <button class="btn-connect" id="btnConnect" onclick="connect()">Conectar</button>
      <button class="btn-disconnect" id="btnDisconnect" onclick="disconnect()" disabled>Desconectar</button>
    </div>
    <div style="font-size: 0.8rem; color: var(--text-muted); text-align: center;">
      Nota: para pruebas locales usar ws://localhost:8080, en OpenShift usar wss://
    </div>

    <!-- Estadísticas y Estado -->
    <div class="stats-panel">
      <div class="stat-badge">
        <div class="status-indicator" id="statusDot"></div>
        <span id="statusText">Desconectado</span>
      </div>
      <div class="stat-badge">
        Enviados: <span id="sentCount">0</span>
      </div>
      <div class="stat-badge">
        Recibidos: <span id="receivedCount">0</span>
      </div>
    </div>

    <!-- Contenedor del Chat -->
    <div id="chat">
      <div class="message message-info">El historial de mensajes aparecerá aquí...</div>
    </div>

    <!-- Panel de envío de mensajes -->
    <div class="input-panel">
      <input type="text" id="message" placeholder="Escribe tu mensaje..." onkeypress="handleKeyPress(event)" disabled>
      <button class="btn-send" id="btnSend" onclick="sendMessage()" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576 6.636 10.07Zm6.787-8.201L1.591 6.602l4.339 2.76 7.494-7.493Z"/>
        </svg>
        Enviar
      </button>
    </div>
  </div>

  <script>
    let ws = null;
    let sentMessagesCount = 0;
    let receivedMessagesCount = 0;
    let myId = null;

    // Referencias a elementos del DOM
    const urlInput = document.getElementById('url');
    const messageInput = document.getElementById('message');
    const chatDiv = document.getElementById('chat');
    const btnConnect = document.getElementById('btnConnect');
    const btnDisconnect = document.getElementById('btnDisconnect');
    const btnSend = document.getElementById('btnSend');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const sentCountSpan = document.getElementById('sentCount');
    const receivedCountSpan = document.getElementById('receivedCount');

    // Función para conectar al servidor WebSocket
    function connect() {
      const url = urlInput.value.trim();
      if (!url) return alert('Por favor ingresa una URL válida');

      try {
        ws = new WebSocket(url);

        ws.onopen = () => {
          updateUIState(true);
          log({ type: 'info', message: 'Conectado al servidor WebSocket' });
        };

        ws.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            
            // Si el servidor nos asignó un ID en el mensaje de bienvenida, lo intentamos capturar
            // (Esta es una heurística simple basada en el formato de tu server.js)
            if (data.type === 'welcome' && data.message.includes('Hola cliente')) {
               const match = data.message.match(/cliente (\d+)/);
               if (match) myId = parseInt(match[1]);
               // También lo mostramos como info en el chat
               data.type = 'info';
            }

            if (data.type === 'message') {
              receivedMessagesCount++;
              receivedCountSpan.textContent = receivedMessagesCount;
            }
            log(data);
          } catch (e) {
            console.error('Error parseando mensaje:', e);
          }
        };

        ws.onclose = () => {
          updateUIState(false);
          log({ type: 'info', message: 'Desconectado del servidor WebSocket' });
          ws = null;
          myId = null;
        };

        ws.onerror = (error) => {
          console.error('WebSocket Error:', error);
          log({ type: 'info', message: 'Error en la conexión WebSocket. Verifica la URL y si el servidor está corriendo.' });
        };
      } catch (err) {
        alert('Error al intentar crear la conexión: ' + err.message);
      }
    }

    // Función para desconectar
    function disconnect() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.close();
      }
    }

    // Función para enviar mensaje
    function sendMessage() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert('El socket no está abierto');
        return;
      }

      const text = messageInput.value.trim();
      if (text) {
        // Enviar al servidor en formato JSON
        ws.send(JSON.stringify({ text: text }));
        
        messageInput.value = '';
        messageInput.focus();
        
        sentMessagesCount++;
        sentCountSpan.textContent = sentMessagesCount;
      }
    }

    // Soporte para enviar con Enter
    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }

    // Función para agregar mensajes al DOM
    function log(data) {
      const msgDiv = document.createElement('div');
      
      if (data.type === 'info') {
        msgDiv.className = 'message message-info';
        msgDiv.textContent = data.message;
      } else if (data.type === 'message') {
        const isSelf = data.from === myId;
        msgDiv.className = `message ${isSelf ? 'message-self' : 'message-other'}`;
        
        const senderSpan = document.createElement('div');
        senderSpan.className = 'message-sender';
        senderSpan.textContent = isSelf ? 'Tú' : `Cliente ${data.from}`;
        
        const textNode = document.createTextNode(data.text);
        
        msgDiv.appendChild(senderSpan);
        msgDiv.appendChild(textNode);
      }

      chatDiv.appendChild(msgDiv);
      // Auto-scroll hacia el final
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    // Actualiza los botones y el estado visual
    function updateUIState(isConnected) {
      btnConnect.disabled = isConnected;
      urlInput.disabled = isConnected;
      btnDisconnect.disabled = !isConnected;
      btnSend.disabled = !isConnected;
      messageInput.disabled = !isConnected;

      if (isConnected) {
        statusDot.classList.add('connected');
        statusText.textContent = 'Conectado';
        messageInput.focus();
      } else {
        statusDot.classList.remove('connected');
        statusText.textContent = 'Desconectado';
      }
    }
  </script>
</body>
</html>
